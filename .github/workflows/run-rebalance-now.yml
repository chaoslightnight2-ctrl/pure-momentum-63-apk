name: Run Rebalance Now

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pure-momentum-paper-orders
  cancel-in-progress: false

jobs:
  paper-rebalance-now:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Istanbul
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile paper runner
        run: |
          python -m py_compile scripts/run_pure_momentum_paper.py src/trading/alpaca_paper.py src/utils/io_utils.py

      - name: Run focused guard tests
        run: |
          python -m pytest tests/test_pure_momentum_evidence_guards.py

      - name: Rebalance paper account now
        run: |
          python scripts/run_pure_momentum_paper.py \
            --config config/settings.yaml \
            --state-path state/pure_momentum_state.json \
            --execute \
            --force-rebalance \
            --ignore-phase-lock \
            --buy-submission-rounds-override 1

      - name: Commit rebalance state
        shell: bash
        run: |
          if git diff --quiet -- state/pure_momentum_state.json; then
            echo "No rebalance state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/pure_momentum_state.json
          git commit -m "Update pure momentum rebalance state"
          git pull --rebase
          git push

      - name: Upload rebalance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-rebalance-now-report
          path: reports/pure_momentum_paper_run.json
          if-no-files-found: ignore
