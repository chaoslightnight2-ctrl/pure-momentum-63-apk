name: Inspect Paper Account

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-paper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Europe/Istanbul
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inspect paper account
        run: |
          python scripts/inspect_paper_account.py

      - name: Upload account report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspect-paper-account
          path: reports/inspect_paper_account.json
          if-no-files-found: ignore
