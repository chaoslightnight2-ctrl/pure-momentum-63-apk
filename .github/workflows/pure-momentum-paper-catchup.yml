name: Pure Momentum Paper Catch-up Buys

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pure-momentum-paper-orders
  cancel-in-progress: false

jobs:
  catchup-buys:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Istanbul
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile paper runner
        run: |
          python -m py_compile scripts/run_pure_momentum_paper.py src/trading/alpaca_paper.py src/utils/io_utils.py

      - name: Run buy-only catch-up
        run: |
          python scripts/run_pure_momentum_paper.py \
            --config config/settings.yaml \
            --state-path state/pure_momentum_state.json \
            --execute \
            --force-rebalance \
            --ignore-phase-lock \
            --ignore-daily-loss-block \
            --buy-only-rebalance \
            --buy-submission-rounds-override 10

      - name: Upload catch-up report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pure-momentum-paper-catchup-run
          path: reports/pure_momentum_paper_run.json
          if-no-files-found: ignore
