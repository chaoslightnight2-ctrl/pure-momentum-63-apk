name: Pure Momentum Paper Orders

on:
  workflow_dispatch:
    inputs:
      force_rebalance:
        description: "Force rebalance even if the 7-trading-day gate is not due"
        required: false
        default: "false"
      ignore_phase_lock:
        description: "Emergency override for rebalance phase lock"
        required: false
        default: "false"
  schedule:
    # Weekdays once after the regular US market open. The bot still checks
    # Alpaca market-open status and only rebalances after 7 trading days.
    - cron: "45 14 * * 1-5"

permissions:
  contents: write

concurrency:
  group: pure-momentum-paper-orders
  cancel-in-progress: false

jobs:
  paper-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Istanbul
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile paper runner
        run: |
          python -m py_compile scripts/run_pure_momentum_paper.py src/trading/alpaca_paper.py src/utils/io_utils.py

      - name: Run Pure Momentum paper orders
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.force_rebalance }}" = "true" ]; then
            EXTRA_ARGS="--force-rebalance"
          fi
          if [ "${{ github.event.inputs.ignore_phase_lock }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --ignore-phase-lock"
          fi
          python scripts/run_pure_momentum_paper.py --config config/settings.yaml --state-path state/pure_momentum_state.json --execute $EXTRA_ARGS

      - name: Commit rebalance state
        shell: bash
        run: |
          if git diff --quiet -- state/pure_momentum_state.json; then
            echo "No rebalance state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/pure_momentum_state.json
          git commit -m "Update pure momentum rebalance state"
          git pull --rebase
          git push

      - name: Upload last run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pure-momentum-paper-run
          path: reports/pure_momentum_paper_run.json
          if-no-files-found: ignore
